# inventory.ini
# Ansible inventory for web servers running Nginx

[webservers]
# Replace with your actual server IPs or hostnames
web1.example.com ansible_host=10.0.1.10
web2.example.com ansible_host=10.0.1.11
web3.example.com ansible_host=10.0.1.12

[webservers:vars]
# SSH connection settings
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/prod-key.pem
ansible_python_interpreter=/usr/bin/python3

# Optional: If using different user
# ansible_user=ec2-user  # For Amazon Linux
# ansible_user=admin     # For Debian

# Optional: If servers are behind a bastion/jump host
# ansible_ssh_common_args='-o ProxyCommand="ssh -W %h:%p -q bastion.example.com"'

[staging]
# Staging environment servers (for testing updates first)
staging1.example.com ansible_host=10.0.2.10

[staging:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/staging-key.pem
ansible_python_interpreter=/usr/bin/python3

[production]
# Production environment servers
prod1.example.com ansible_host=10.0.3.10
prod2.example.com ansible_host=10.0.3.11
prod3.example.com ansible_host=10.0.3.12

[production:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/prod-key.pem
ansible_python_interpreter=/usr/bin/python3
